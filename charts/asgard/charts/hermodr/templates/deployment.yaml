apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermodr
  labels: { app: hermodr }
spec:
  replicas: 1
  selector:
    matchLabels: { app: hermodr }
  template:
    metadata:
      labels: { app: hermodr }
    spec:
      containers:
        - name: hermodr
          image: {{ .Values.image | default "asgard-hermodr-yggdrasil:latest" }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "Never" }}
          ports: [{ containerPort: 8090 }]
          env:
            - { name: SERVICE_NAME, value: yggdrasil }
            - { name: UPSTREAM_URL, value: "http://yggdrasil.{{ .Release.Namespace }}.svc:8080" }
            - { name: PORT, value: "8090" }
            - { name: RUST_LOG, value: {{ .Values.global.rustLog | default "info" | quote }} }
          resources:
            requests: { memory: 32Mi, cpu: 50m }
            limits: { memory: 128Mi, cpu: 200m }
---
apiVersion: v1
kind: Service
metadata:
  name: hermodr
spec:
  selector: { app: hermodr }
  ports: [{ port: 8090, targetPort: 8090 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ratatoskr
  labels: { app: ratatoskr }
spec:
  replicas: 1
  selector:
    matchLabels: { app: ratatoskr }
  template:
    metadata:
      labels: { app: ratatoskr }
    spec:
      containers:
        - name: ratatoskr
          image: {{ .Values.image | default "asgard-ratatoskr:latest" }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "Never" }}
          ports: [{ containerPort: 9200 }]
          env:
            - { name: PORT, value: "9200" }
            - { name: RUST_LOG, value: ratatoskr=info }
          resources:
            requests: { memory: 256Mi, cpu: 100m }
            limits: { memory: 2Gi, cpu: "1" }
---
apiVersion: v1
kind: Service
metadata:
  name: ratatoskr
spec:
  selector: { app: ratatoskr }
  ports: [{ port: 9200, targetPort: 9200 }]
