apiVersion: apps/v1
kind: Deployment
metadata:
  name: fenrir
  labels: { app: fenrir }
spec:
  replicas: 1
  selector:
    matchLabels: { app: fenrir }
  template:
    metadata:
      labels: { app: fenrir }
    spec:
      containers:
        - name: fenrir
          image: {{ .Values.image | default "asgard-fenrir:latest" }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "Never" }}
          ports: [{ containerPort: 8200 }]
          env:
            - { name: FENRIR_HOST, value: "0.0.0.0" }
            - { name: FENRIR_PORT, value: "8200" }
            - { name: HEIMDALL_URL, value: {{ .Values.global.heimdallUrl | quote }} }
            - { name: BROWSER_HEADLESS, value: "true" }
            - { name: LOG_LEVEL, value: {{ .Values.global.logLevel | default "info" | quote }} }
          readinessProbe:
            httpGet: { path: /healthz, port: 8200 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { memory: 128Mi, cpu: 100m }
            limits: { memory: 512Mi, cpu: 500m }
---
apiVersion: v1
kind: Service
metadata:
  name: fenrir
spec:
  type: NodePort
  selector: { app: fenrir }
  ports:
    - port: 8200
      targetPort: 8200
      nodePort: {{ .Values.nodePort | default 30200 }}
