apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  labels: { app: otel-collector }
data:
  relay.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    exporters:
      # Export to Laminar Backend
      otlp/laminar:
        endpoint: "laminar-app-server.{{ .Release.Namespace }}.svc:8001"
        tls:
          insecure: true
        headers:
          authorization: Bearer {{ .Values.laminarApiKey | default "LMNR_PROJECT_API_KEY_PLACEHOLDER" }}
      
      # Export logs directly to console (Vardr picks this up) or specific webhook for Tyr SIEM
      logging/tyr:
        verbosity: detailed

    processors:
      batch:
        send_batch_size: 100
        timeout: 5s

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/laminar]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [logging/tyr]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [logging/tyr]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  labels: { app: otel-collector }
spec:
  replicas: 1
  selector:
    matchLabels: { app: otel-collector }
  template:
    metadata:
      labels: { app: otel-collector }
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector:0.99.0
          command:
            - "/otelcol"
            - "--config=/conf/relay.yaml"
          ports:
            - containerPort: 4317 # gRPC
            - containerPort: 4318 # HTTP
          volumeMounts:
            - name: otel-config
              mountPath: /conf
      volumes:
        - name: otel-config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
spec:
  selector: { app: otel-collector }
  ports:
    - name: grpc
      port: 4317
      targetPort: 4317
    - name: http
      port: 4318
      targetPort: 4318
