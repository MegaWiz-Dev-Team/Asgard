apiVersion: apps/v1
kind: Deployment
metadata:
  name: bifrost
  labels: { app: bifrost }
spec:
  replicas: 1
  selector:
    matchLabels: { app: bifrost }
  template:
    metadata:
      labels: { app: bifrost }
    spec:
      containers:
        - name: bifrost
          image: {{ .Values.image | default "asgard-bifrost:latest" }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "Never" }}
          ports: [{ containerPort: 8100 }]
          env:
            - { name: BIFROST_HOST, value: "0.0.0.0" }
            - { name: BIFROST_PORT, value: "8100" }
            - { name: HEIMDALL_URL, value: {{ .Values.global.heimdallUrl | quote }} }
            - { name: MIMIR_URL, value: "http://mimir-api.{{ .Release.Namespace }}.svc:8080" }
            - { name: YGGDRASIL_MCP_URL, value: "http://hermodr.{{ .Release.Namespace }}.svc:8090/rpc" }
            - { name: YGGDRASIL_MCP_ENABLED, value: "true" }
            - { name: DEFAULT_MODEL, value: {{ .Values.defaultModel | default "mlx-community/Qwen3.5-9B-MLX-4bit" | quote }} }
            - { name: MAX_ITERATIONS, value: {{ .Values.maxIterations | default 10 | quote }} }
            - { name: MAX_EXECUTION_TIME, value: {{ .Values.maxExecutionTime | default 120 | quote }} }
            - { name: AUTH_ENABLED, value: "false" }
            - { name: LOG_LEVEL, value: {{ .Values.global.logLevel | default "info" | quote }} }
          readinessProbe:
            httpGet: { path: /healthz, port: 8100 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { memory: 128Mi, cpu: 100m }
            limits: { memory: 512Mi, cpu: 500m }
---
apiVersion: v1
kind: Service
metadata:
  name: bifrost
spec:
  type: NodePort
  selector: { app: bifrost }
  ports:
    - port: 8100
      targetPort: 8100
      nodePort: {{ .Values.nodePort | default 30100 }}
