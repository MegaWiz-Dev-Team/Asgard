apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vector
  namespace: wazuh
spec:
  selector:
    matchLabels:
      app: vector
  template:
    metadata:
      labels:
        app: vector
    spec:
      serviceAccountName: vector
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
      containers:
        - name: vector
          image: timberio/vector:0.35.0-debian
          imagePullPolicy: IfNotPresent
          args:
            - --config
            - /etc/vector/vector.toml
          volumeMounts:
            - name: vector-config
              mountPath: /etc/vector/
            - name: varlog
              mountPath: /var/log/
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers/
              readOnly: true
      volumes:
        - name: vector-config
          configMap:
            name: vector-config
        - name: varlog
          hostPath:
            path: /var/log/
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers/
