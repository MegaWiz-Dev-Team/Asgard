# 🛡️ Várðr — Monitoring Dashboard
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vardr
  namespace: asgard-monitoring
  labels:
    app: vardr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vardr
  template:
    metadata:
      labels:
        app: vardr
    spec:
      containers:
        - name: vardr
          image: asgard-vardr:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9090
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 200m
---
apiVersion: v1
kind: Service
metadata:
  name: vardr
  namespace: asgard-monitoring
spec:
  selector:
    app: vardr
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
  type: NodePort
