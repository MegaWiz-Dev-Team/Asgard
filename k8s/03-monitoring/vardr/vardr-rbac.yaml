apiVersion: v1
kind: ServiceAccount
metadata:
  name: vardr-monitor
  namespace: asgard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vardr-monitoring-role
  namespace: asgard
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "pods/status", "services", "endpoints", "events"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vardr-monitoring-binding
  namespace: asgard
subjects:
- kind: ServiceAccount
  name: vardr-monitor
  namespace: asgard
roleRef:
  kind: Role
  name: vardr-monitoring-role
  apiGroup: rbac.authorization.k8s.io
