# 🏰 Asgard — cert-manager + Let's Encrypt TLS
#
# Pre-requisite: Install cert-manager
#   helm repo add jetstack https://charts.jetstack.io
#   helm install cert-manager jetstack/cert-manager \
#     -n cert-manager --create-namespace \
#     --set crds.enabled=true

# ClusterIssuer for Let's Encrypt (Staging for testing)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: paripol@megawiz.co
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: traefik
---
# ClusterIssuer for Let's Encrypt (Production)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: paripol@megawiz.co
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: traefik
---
# Wildcard Certificate for local dev
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: asgard-tls
  namespace: asgard-services
spec:
  secretName: asgard-tls-secret
  issuerRef:
    name: letsencrypt-staging
    kind: ClusterIssuer
  dnsNames:
    - asgard.local
    - "*.asgard.local"
