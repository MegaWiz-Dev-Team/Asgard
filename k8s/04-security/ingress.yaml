# 🏰 Asgard — Traefik Ingress Routes
# Exposes all services via clean URLs on asgard.local

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: asgard-ingress
  namespace: asgard
  annotations:
    cert-manager.io/cluster-issuer: "asgard-ca-issuer"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  tls:
    - hosts: ["*.asgard.internal", "portal.asgard.internal", "asgard.internal"]
      secretName: asgard-tls-secret
  rules:
    - host: asgard.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: asgard-portal
                port: { number: 30005 }
    - host: portal.asgard.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: asgard-portal
                port: { number: 30005 }
    - host: mimir.asgard.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mimir-dashboard
                port: { number: 3000 }
    - host: api.asgard.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mimir-api
                port: { number: 8080 }
    - host: bifrost.asgard.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bifrost
                port: { number: 8100 }
    - host: fenrir.asgard.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fenrir
                port: { number: 8200 }
    - host: forseti.asgard.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: forseti
                port: { number: 5555 }
    - host: vault.asgard.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fafnir-vault
                port: { number: 8200 }
    - host: monitor.asgard.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vardr
                port: { number: 9090 }
    - host: sso.asgard.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: yggdrasil
                port: { number: 8080 }
    - host: ehr.asgard.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: eir
                port: { number: 80 }
