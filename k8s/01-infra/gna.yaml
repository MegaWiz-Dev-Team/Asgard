# 🕊️ Gná — Asgard's Mock SMTP Server & Email Catcher (Powered by Mailpit)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gna
  namespace: asgard
  labels:
    app: gna
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gna
  template:
    metadata:
      labels:
        app: gna
    spec:
      containers:
        - name: gna
          image: axllent/mailpit:latest
          ports:
            - containerPort: 8025 # Web UI
            - containerPort: 1025 # SMTP Server
          env:
            - name: MP_MAX_MESSAGES
              value: "5000"
---
apiVersion: v1
kind: Service
metadata:
  name: gna
  namespace: asgard
spec:
  type: NodePort
  selector:
    app: gna
  ports:
    - name: ui
      port: 8025
      targetPort: 8025
      nodePort: 30025 # Access Web UI at http://localhost:30025
    - name: smtp
      port: 1025
      targetPort: 1025
