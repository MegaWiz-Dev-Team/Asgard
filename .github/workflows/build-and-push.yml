# 🏰 Asgard — Build & Push Docker Images to ghcr.io
name: Build and Push

on:
  push:
    branches: [main]
    paths:
      - 'charts/**'
      - 'k8s/**'
      - 'docker-compose.yml'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build (all, mimir, bifrost, fenrir, forseti, hermodr, ratatoskr, mjolnir, vardr, pageindex)'
        required: false
        default: 'all'

env:
  REGISTRY: ghcr.io
  ORG: megawiz-dev-team

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: changes
        name: Detect changed services
        run: |
          if [ "${{ github.event.inputs.service }}" = "all" ] || [ -z "${{ github.event.inputs.service }}" ]; then
            echo 'services=[{"name":"mimir-api","repo":"Mimir","context":"./_service","dockerfile":"./_service/ro-ai-bridge/Dockerfile"},{"name":"mimir-dashboard","repo":"Mimir","context":"./_service/ro-ai-dashboard","dockerfile":"./_service/ro-ai-dashboard/Dockerfile"},{"name":"bifrost","repo":"Bifrost","context":"./_service","dockerfile":"./_service/Dockerfile"},{"name":"fenrir","repo":"Fenrir","context":"./_service","dockerfile":"./_service/Dockerfile"},{"name":"forseti","repo":"Forseti","context":"./_service","dockerfile":"./_service/Dockerfile"},{"name":"hermodr-yggdrasil","repo":"Hermodr","context":"./_service","dockerfile":"./_service/Dockerfile"},{"name":"ratatoskr","repo":"Ratatoskr","context":"./_service","dockerfile":"./_service/Dockerfile"},{"name":"mjolnir","repo":"Mjolnir","context":"./_service","dockerfile":"./_service/Dockerfile"},{"name":"vardr","repo":"Vardr","context":"./_service","dockerfile":"./_service/Dockerfile"},{"name":"pageindex","repo":"Mimir","context":"./_service/pageindex-sidecar","dockerfile":"./_service/pageindex-sidecar/Dockerfile"},{"name":"eir-gateway","repo":"Eir","context":"./_service","dockerfile":"./_service/Dockerfile.gateway"}]' >> $GITHUB_OUTPUT
          else
            # Extremely basic manual trigger filter for simplicity
            echo 'services=[{"name":"mimir-api","repo":"Mimir","context":"./_service","dockerfile":"./_service/ro-ai-bridge/Dockerfile"}]' >> $GITHUB_OUTPUT
          fi

  build:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
      fail-fast: false
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Asgard
        uses: actions/checkout@v4

      - name: Checkout service repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ORG }}/${{ matrix.service.repo }}
          path: _service
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.service.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
