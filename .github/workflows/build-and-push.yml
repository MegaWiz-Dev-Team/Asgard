# 🏰 Asgard — Build & Push Docker Images to ghcr.io
name: Build and Push

on:
  push:
    branches: [main]
    paths:
      - 'charts/**'
      - 'k8s/**'
      - 'docker-compose.yml'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build (all, mimir, bifrost, fenrir, forseti, hermodr, ratatoskr, mjolnir, vardr, pageindex)'
        required: false
        default: 'all'

env:
  REGISTRY: ghcr.io
  ORG: megawiz-dev-team

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: changes
        name: Detect changed services
        run: |
          if [ "${{ github.event.inputs.service }}" = "all" ] || [ -z "${{ github.event.inputs.service }}" ]; then
            # Auto-detect by checking sibling repo changes (or build all on manual)
            echo 'services=["mimir-api","mimir-dashboard","bifrost","fenrir","forseti","hermodr","ratatoskr","mjolnir","vardr","pageindex","eir-gateway"]' >> $GITHUB_OUTPUT
          else
            echo 'services=["${{ github.event.inputs.service }}"]' >> $GITHUB_OUTPUT
          fi

  build:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
      fail-fast: false
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Asgard
        uses: actions/checkout@v4

      - name: Checkout service repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ORG }}/${{ matrix.service }}
          path: _service
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./_service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
